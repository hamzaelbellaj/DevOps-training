apiVersion: v1
kind: Namespace
metadata:
  name: intern-assessment

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: intern-assessment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: intern-assessment
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80